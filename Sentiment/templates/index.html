{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>

<style>
*{ margin: 0; padding: 0; box-sizing: border-box; }
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background-image: url("{% static 'images/back4.jpeg' %}");
    background-size: cover;
    background-position: center;
}
header{
    width:100%;
    height:4rem;
    background-color: rgb(75, 152, 177);
    position: sticky;
    top: 0;
    z-index: 10;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 3rem;
}
#heading h1 {
    margin:0;
    white-space: nowrap;
}
#component{
    display:flex;
    gap:2rem;
    white-space: nowrap;
}
#component a{
    text-decoration:none;
    color:black;
    font-weight:bold;
    font-size:1rem;
}
main{
   min-height: 100vh;
   padding-top: 4rem;
}
img {
    display: block;
    width: 85%;
    height: 300px;
    margin: auto;
}
#main-head{
    margin-top: 3rem;
    text-align: center;
}
footer {
    background-color: rgb(75, 152, 177);
    color: black;
    position: fixed;
    bottom: 0;
    width: 100%;
    text-align: center;
    padding: 6px 0;
}
@media (max-width: 900px) {

    header {
        flex-direction: column;
        height:auto;
        padding:1rem 0;
    }

    #component {
        margin-top: 0.5rem;
    }

    img {
        width: 95%;
        height: auto;
    }
}
</style>
</head>

<body>

<header>
    <div id="heading">
         <h1>Product Sentiment</h1>
    </div>

    <div id="component">
        <a href="/">Home</a>
        <a href="{% url 'register' %}">Register</a>
        <a href="{% url 'login' %}">Login</a>
    </div>
</header>

<main>

    <img src="{% static 'images/p2.jpg' %}"/>

    <div id="main-head">
        <h2>
            <span style="background-color: antiquewhite;">Welcome to Home Page</span>
        </h2>
    </div>

</main>

<footer>
    <h4>&copy; 2025 All Rights Reserved SAK Informatics</h4>
</footer>

</body>
</html>
