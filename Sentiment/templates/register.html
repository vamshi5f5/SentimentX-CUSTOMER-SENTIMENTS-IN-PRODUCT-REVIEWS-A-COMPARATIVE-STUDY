{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: Arial, sans-serif;
    overflow-x: hidden;
    background-image: url("{% static 'images/back4.jpeg' %}");
    background-size: cover;
    background-position: center;
}
header{
    width:100%;
    height:4rem;
    background-color: rgb(75, 152, 177);
    position:fixed;
    top:0;
    z-index:10;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 3rem;
}
#heading h1 {
    margin:0;
}
#component{
    display:flex;
    gap:2rem;
}
#component a{
    font-weight:bold;
    text-decoration:none;
    color:black;
}
main {
    padding-top: 6rem;
    min-height: 100vh;
}
img {
    display: block;
    width: 85%;
    height: 300px;
    margin: 2rem auto 1rem auto;
}
#reg-head {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 1rem;
    color:aliceblue;
}
form {
    width: 100%;
    max-width: 600px;
    margin: 1rem auto 5rem auto;
    padding: 1rem;
    border-radius: 8px;
}
form div {
    display: flex;
    align-items: center;
    margin: 1rem 0;
}
label {
    width: 180px;
    font-size: 1.1rem;
    font-weight: bold;
    color:aliceblue;
}
input, textarea {
    width: 50%;
    padding: 0.7rem;
    border: none;
    outline: none;
    border-radius: 4px;
    font-size: 1rem;
}
#btn-sub {
    margin: 1.5rem auto;
    display: block;
    padding: 0.8rem 4rem;
    font-weight: bold;
    cursor: pointer;
    border-radius: 20px;
}
footer {
  background-color: rgb(75, 152, 177);
    padding: 0.5rem;
    text-align: center;
    width: 100%;
    position: fixed;
    bottom: 0;
}
</style>
</head>

<body>

<header>
    <div id="heading">
      <h1>Product Sentiment</h1>
    </div>

    <div id="component">
        <a href="/">Home</a>
        <a href="{% url 'register' %}">Register</a>
        <a href="{% url 'login' %}">Login</a>
    </div>
</header>

<main>

    <img src="{% static 'images/p2.jpg' %}" width="80%" height="300px"/>

    <h1 id="reg-head">Register</h1>

    <form method="post">
        {% csrf_token %}
        {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
        {% if success %}<p style="color:green;">{{ success }}</p>{% endif %}

        <div>
            <label>Name:</label>
            <input type="text" name="username" placeholder="Enter User Name" required autofocus/>
        </div>

        <div>
            <label>Email:</label>
            <input type="email" name="email" placeholder="Enter Email" required/>
        </div>

        <div>
            <label>Password:</label>
            <input type="password" name="password" placeholder="Enter Password" required/>
        </div>

        <div>
            <label>Confirm Password:</label>
            <input type="password" name="confirm_password" placeholder="Re-enter password" required/>
        </div>

        <div>
            <label>Mobile Number:</label>
            <input type="number" name="mobile" placeholder="Enter mobile number" required>
        </div>

        <div>
            <label>Address:</label>
            <textarea name="address" rows="3" cols="30" placeholder="Enter full address" required></textarea>
        </div>

        <button type="submit" id="btn-sub">Submit</button>

    </form>

</main>

<footer>
    <h4>&copy; 2025 All Rights Reserved SAK Informatics</h4>
</footer>

</body>
</html>
