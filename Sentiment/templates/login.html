{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: Arial, sans-serif;
    background-image: url("{% static 'images/back4.jpeg' %}");
    background-size: cover;
    background-position: center;
}
header {
    width: 100%;
    height: 4rem;
    background-color: rgb(75, 152, 177);
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 3rem;
}
#heading h1 {
    margin: 0;
}
#component {
    display: flex;
    gap: 2rem;
}
#component a {
    font-weight: bold;
    text-decoration: none;
    color: black;
}
main {
    padding: 3rem 1rem 5rem;
    min-height: 100vh;
}
img {
    display: block;
    width: 85%;
    height: 300px;
    margin: auto;
}
#loginh1 {
    text-align: center;
    font-size: 2rem;
    margin-top: 2rem;
    color:aliceblue;
}
form {
    width: 100%;
    max-width: 600px;
    margin: 1rem auto;
    padding: 1rem;
}
form div {
    display: flex;
    align-items: center;
    margin: 1rem auto;
}
label {
    width: 150px;
    font-size: 1.2rem;
    font-weight: bold;
    color:aliceblue;
}
input {
    width: 50%;
    padding: 0.7rem;
    border-radius: 4px;
    border: none;
    outline: none;
    font-size: 1rem;
}
#log-btn {
    display: block;
    padding: 0.7rem 4rem;
    margin: 1.5rem auto;
    cursor: pointer;
    font-weight: bold;
    border-radius: 20px;
}
footer {
     background-color: rgb(75, 152, 177);
    width: 100%;
    padding: 0.5rem;
    position: fixed;
    bottom: 0;
    text-align: center;
}
@media (max-width: 900px) {
    header {
        flex-direction: column;
        height: auto;
        padding: 1rem 0;
    }
    #component {
        margin-top: 0.5rem;
    }
    img {
        width: 95%;
        height:300px;
    }
}
</style>
</head>

<body>

<header>
    <div id="heading">
           <h1>Product Sentiment</h1>
    </div>

    <div id="component">
        <a href="/">Home</a>
        <a href="{% url 'register' %}">Register</a>
        <a href="{% url 'login' %}">Login</a>
    </div>
</header>


<main>

    <img src="{% static 'images/p2.jpg' %}" />

    <h2 id="loginh1">Login Page</h2>

    <form method="post">
        {% csrf_token %}
        {% if error %}<p style="color:red;margin: 0.5rem;">{{ error }}</p>{% endif %}
        {% if success %}<p style="color:green;margin: 0.5rem;">{{ success }}</p>{% endif %}

        <div>
            <label>Name:</label>
            <input type="text" name="username" placeholder="Enter User Name" required autofocus />
        </div>

        <div>
            <label>Password:</label>
            <input type="password" name="password" placeholder="Enter Password" required />
        </div>

        <button type="submit" id="log-btn">Submit</button>

    </form>

</main>


<footer>
    <h4>&copy; 2025 All Rights Reserved SAK Informatics</h4>
</footer>

</body>
</html>
